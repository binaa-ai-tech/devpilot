name: CI

# Pipeline isolation:
#   • Cheap validation (lint + syntax + tests) runs on every PR and push — this
#     is the pre-merge safety gate, so nothing lands on develop unvalidated.
#   • Expensive work (build / deploy / publish) runs ONLY on a push to develop,
#     i.e. AFTER a PR has been merged. It never runs on the PR itself, so the
#     temporary PR phase stays fast and cheap.

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:

# Cancel superseded PR runs to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Cheap gate — runs on PRs and pushes ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (scripts)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # error-level gate: catch real bugs, not style nits. Sourced config excluded.
          shellcheck -S error -e SC1090,SC1091 scripts/*.sh tests/*.sh

      - name: bash syntax check
        run: |
          for f in scripts/*.sh tests/*.sh install.sh; do
            bash -n "$f" || exit 1
          done

      - name: run test suite
        run: bash tests/run.sh

  # ── Expensive pipeline — ONLY after merge to develop ─────────────────────────
  # Gated so it never runs on the PR. Add real build/deploy/publish steps here;
  # they execute once the merge into develop is complete.
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    concurrency:
      group: deploy-develop
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: deploy / publish (develop only)
        run: |
          echo "Merged into develop — running the expensive pipeline."
          echo "Add build, deploy, and publish steps here."
          # e.g. ./scripts/deploy-dev.sh
